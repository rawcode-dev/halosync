name: HaloSync CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version Bump (ignored if Custom Tag is set)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_tag:
        description: 'Custom Tag (e.g. 2.0.0)'
        required: false
        type: string

jobs:
  security-scan:
    name: CodeQL Security Scan
    runs-on: macos-15
    permissions:
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: swift
        
    - name: Generate Xcode Project
      run: |
        arch -arm64 brew install xcodegen
        xcodegen generate
        
    - name: Build project for CodeQL
      run: |
        xcodebuild clean build \
          -project HaloSync.xcodeproj \
          -scheme HaloSync \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
          
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  test:
    name: Run Unit Tests
    runs-on: macos-15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Generate Xcode Project
      run: |
        arch -arm64 brew install xcodegen
        xcodegen generate
      
    - name: Run Tests
      run: |
        xcodebuild test \
          -project HaloSync.xcodeproj \
          -scheme HaloSync \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

  build-dmg:
    name: Build & Package DMG
    runs-on: macos-15
    needs: [test, security-scan]
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Tools
      run: |
        arch -arm64 brew install create-dmg xcodegen
        
    - name: Generate Xcode Project
      run: xcodegen generate
      
    - name: Build Release App
      run: |
        xcodebuild clean build \
          -project HaloSync.xcodeproj \
          -scheme HaloSync \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
        
    - name: Create DMG Package
      run: |
        create-dmg \
          --volname "HaloSync" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "HaloSync.app" 150 190 \
          --hide-extension "HaloSync.app" \
          --app-drop-link 450 185 \
          "HaloSync.dmg" \
          "build/Build/Products/Release/HaloSync.app"
          
    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HaloSync-macOS-Release
        path: HaloSync.dmg
        
    - name: Bump version and push tag
      if: github.event_name != 'pull_request'
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: ${{ github.event.inputs.bump_type || 'patch' }}
        custom_tag: ${{ github.event.inputs.custom_tag }}
        custom_release_rules: "feat:patch,fix:patch,chore:patch,refactor:patch,docs:patch,style:patch,test:patch,perf:patch"
        
    - name: Publish GitHub Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: "HaloSync ${{ steps.tag_version.outputs.new_tag }}"
        files: HaloSync.dmg
        generate_release_notes: true
